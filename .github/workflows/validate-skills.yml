name: Validate skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Validate Agent Skills packages
        run: |
          for skill in skills/*; do
            uvx skills-ref validate "$skill"
          done
